<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>
  <div id="inputBox">
    <label for="ocr_input"
      >アップロードするファイルを選択してください(PNG or JPG)</label
    >
    <input
      type="file"
      id="ocr_input"
      name="ocr_input"
      accept=".jpg, .jpeg, .png"
    />
  </div>

  <pre id="outputBox"></pre>

  <script>
    document.getElementById("ocr_input").onchange = (e) => {
      const fileInput = document.getElementById("ocr_input");
      const file = fileInput.files[0];

      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
	  document.getElementById('inputBox').remove();
          const buf = reader.result;
          const myWorkerTesseract = new Worker("./myworker_tesseract.js");
          myWorkerTesseract.addEventListener("message", (e) => {
            if (e.data.message === "done") {
              outputBox.innerHTML += e.data.data;
            } else {
              outputBox.innerHTML += JSON.stringify(e.data) + "\n";
            }
          });
          myWorkerTesseract.postMessage({
            message: "img in",
            data: buf,
            filename: file.name,
          });
        };
        reader.readAsArrayBuffer(file);
      } else {
        alert("Please select a file first!");
      }
    };
  </script>
</body>
