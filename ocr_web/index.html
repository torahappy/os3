<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    /* Reset CSS from https://www.joshwcomeau.com/css/custom-css-reset/ */
    /* 1. Use a more-intuitive box-sizing model */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    /* 2. Remove default margin */
    * {
      margin: 0;
    }

    /* 3. Enable keyword animations */
    @media (prefers-reduced-motion: no-preference) {
      html {
        interpolate-size: allow-keywords;
      }
    }

    body {
      /* 4. Add accessible line-height */
      line-height: 1.5;
      /* 5. Improve text rendering */
      -webkit-font-smoothing: antialiased;
    }

    /* 6. Improve media defaults */
    img,
    picture,
    video,
    canvas,
    svg {
      display: block;
      max-width: 100%;
    }

    /* 7. Inherit fonts for form controls */
    input,
    button,
    textarea,
    select {
      font: inherit;
    }

    /* 8. Avoid text overflows */
    p,
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      overflow-wrap: break-word;
    }

    /* 9. Improve line wrapping */
    p {
      text-wrap: pretty;
    }
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      text-wrap: balance;
    }

    /*
  10. Create a root stacking context
*/

    #root,
    #__next {
      isolation: isolate;
    }
    /* END reset CSS*/
    @font-face {
      font-family: "MYGOTHIC";
      src: url("./ZenKakuGothicAntique-Medium.ttf");
    }
    @font-face {
      font-family: "MYMONO";
      src: url("./mononoki-Regular.ttf");
    }
    * {
      font-family: "MYGOTHIC", serif;
    }
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: "MYGOTHIC", sans-serif;
    }
    h1 {
      margin-top: 0.2em;
      margin-left: 1em;
      margin-bottom: 2em;
    }
    #outputBox {
      word-wrap: break-word;
      word-break: break-all;
      white-space: pre-wrap;
      width: 100%;
      height: 80vh;
      overflow: scroll;
      padding: 1em;
      font-family: "MYMONO", monospace;
    }
    #ocr_input {
      visibility: hidden;
    }
    #ocr_input_label {
      display: block;
      text-align: center;
      background-color: #0c3254;
      color: white;
      border-radius: 1em;
      margin: 1em;
      padding: 1em;
      cursor: pointer;
    }
    svg,
    img {
      display: block;
      width: 100%;
    }
    #calculatingIconWrap {
      width: 5.9em;
      margin-left: 1.5em;
      font-size: 1.5em;
      display: none;
    }
    #calculatingIcon {
      overflow: hidden;
      white-space: nowrap;
      letter-spacing: 0.15em;
      animation: typing 6s steps(5, end) infinite;
    }
    @keyframes typing {
      from {
        width: 0;
      }
      to {
        width: 100%;
      }
    }
    a {
      color: #bf2894;
      position: absolute;
      display: block;
      right: 1em;
      top:4em
    }
  </style>
</head>
<body>
  <h1>紙変換機WEB v0.1</h1>
  <a href="license.html">ライセンス文書</a>
  <div id="calculatingIconWrap">
    <div id="calculatingIcon">計算中.......</div>
  </div>
  <div id="inputBox">
    <label aria-role="button" for="ocr_input" id="ocr_input_label">
      このボタンをクリックして、<br />アップロードするファイルを選択してください<br />サーバには送信されず、ブラウザーのなかで計算処理されます<br />(PNG
      or JPG)
    </label>
    <input
      type="file"
      id="ocr_input"
      name="ocr_input"
      accept=".jpg, .jpeg, .png"
    />
  </div>

  <pre id="outputBox"></pre>

  <script src="exif-reader.js"></script>
  <script src="main.js"></script>
</body>
