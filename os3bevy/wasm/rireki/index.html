<!doctype html>
<head>
  <title>りれきしょ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    /* Reset CSS from https://www.joshwcomeau.com/css/custom-css-reset/ */
    /* 1. Use a more-intuitive box-sizing model */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    /* 2. Remove default margin */
    * {
      margin: 0;
    }

    /* 3. Enable keyword animations */
    @media (prefers-reduced-motion: no-preference) {
      html {
        interpolate-size: allow-keywords;
      }
    }

    body {
      /* 4. Add accessible line-height */
      line-height: 1.5;
      /* 5. Improve text rendering */
      -webkit-font-smoothing: antialiased;
    }

    /* 6. Improve media defaults */
    img,
    picture,
    video,
    canvas,
    svg {
      display: block;
      max-width: 100%;
    }

    /* 7. Inherit fonts for form controls */
    input,
    button,
    textarea,
    select {
      font: inherit;
    }

    /* 8. Avoid text overflows */
    p,
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      overflow-wrap: break-word;
    }

    /* 9. Improve line wrapping */
    p {
      text-wrap: pretty;
    }
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      text-wrap: balance;
    }

    /*
  10. Create a root stacking context
*/

    #root,
    #__next {
      isolation: isolate;
    }
    /* END reset CSS*/
    * {
      font-family: sans-serif;
    }
    .dependencies {
      position: absolute;
      right: 0;
      bottom: 0;
      font-size: 16px;
      background: black;
      padding: 1em;
    }
    a {
      color: white;
    }
    canvas {
      width: 100vw;
      height: 100vh;
    }
    .start {
      font-family: sans-serif;
      width: 200px;
      height: 70px;
      background: none;
      color: white;
      position: absolute;
      top: calc(50% - 35px);
      left: calc(50% - 100px);
      cursor: pointer;
      border: none;
    }
    .start-border {
      font-family: sans-serif;
      width: 200px;
      height: 70px;
      background: black;
      color: white;
      position: absolute;
      top: calc(50% - 35px);
      left: calc(50% - 100px);
      cursor: pointer;
      border: 5px red solid;
      border-image: radial-gradient(
          rgba(255, 255, 255, 1) 49%,
          rgba(227, 125, 198, 1) 76%,
          rgba(99, 39, 94, 1) 100%
        )
        2;
      filter: blur(1px);
    }
    .chuii {
      height: 60px;
      position: absolute;
      top: calc(50% + 45px);
      left: calc(50% - min(350px, 100vw) / 2);
      text-align: center;
      width: calc(min(350px, 100vw));
    }
  </style>
</head>
<body>
  <a href="dependencies.html"
    ><p class="dependencies to-be-removed">使用ソフトウェアリスト</p></a
  >
  <div class="start-border to-be-removed"></div>
  <button class="start to-be-removed" id="start-button">スタート Start</button>
  <p class="chuii to-be-removed" id="start-button">
    注意: 点滅する動画が流れます。<br />Warning: video with rapidly flashing
    light
  </p>
  <script type="module">
    function removeButtons() {
      Array.from(document.getElementsByClassName("to-be-removed")).map((x) => {
        x.remove();
      });
    }
    import MyInit from "./rireki.js";
    document
      .getElementById("start-button")
      .addEventListener("click", function () {
        removeButtons();
        window.MyInit = MyInit;
        MyInit();
      });
  </script>
</body>
