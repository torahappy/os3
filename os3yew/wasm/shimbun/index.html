<!doctype html>
<head>
  <title>しんぶんはじぶん</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    /* Reset CSS from https://www.joshwcomeau.com/css/custom-css-reset/ */
    /* 1. Use a more-intuitive box-sizing model */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    /* 2. Remove default margin */
    * {
      margin: 0;
    }

    /* 3. Enable keyword animations */
    @media (prefers-reduced-motion: no-preference) {
      html {
        interpolate-size: allow-keywords;
      }
    }

    body {
      /* 4. Add accessible line-height */
      line-height: 1.5;
      /* 5. Improve text rendering */
      -webkit-font-smoothing: antialiased;
    }

    /* 6. Improve media defaults */
    img,
    picture,
    video,
    canvas,
    svg {
      display: block;
      max-width: 100%;
    }

    /* 7. Inherit fonts for form controls */
    input,
    button,
    textarea,
    select {
      font: inherit;
    }

    /* 8. Avoid text overflows */
    p,
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      overflow-wrap: break-word;
    }

    /* 9. Improve line wrapping */
    p {
      text-wrap: pretty;
    }
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      text-wrap: balance;
    }

    /*
  10. Create a root stacking context
*/

    #root,
    #__next {
      isolation: isolate;
    }
    /* END reset CSS*/
    .footnote {
      font-size: 16px;
      background: black;
      color: #e0e0e0;
      padding: 1.0em;
      padding-top: 0.5em;
      padding-bottom: 0.5em;
      margin-top: 0.5em;
      margin-bottom: 0.5em;
    }
    .footnote a {
      color: #e0e0ff;
    }
    @font-face {
      font-family: "GenEi Koburi Mincho v6";
      src: url("assets/GenEiKoburiMin6-R.ttf");
    }
    * {
      font-family: "GenEi Koburi Mincho v6", serif;
    }
    body {
      font-size: 18px;
    }
    /* small images */
    .article img {
      width: 10em;
    }
    /* heading images */
    .article .images img {
      width: 100%;
      /*height: 30em;
      object-fit: contain;
      object-position: left top;*/
    }
    .article.fading, .btn-fading {
      transition-property: opacity;
      transition-duration: 10s;
      transition-delay: 0s;
      opacity: 0;
    }
    .article.fading-cleanup {
      transition-property: opacity;
      transition-duration: 18s;
      transition-delay: 0s;
      opacity: 0;
    }
    .article.hidden {
      display: none;
    }
    .article.forecast {
      animation: 10s linear 0s 1 normal forecast-introduce;
    }
    @keyframes forecast-introduce {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .forecast img {
      opacity: 0.3;
    }
    .app-wrapper:has(.forecast) {
      filter: url("#forecast-filter");
      pointer-events: none;
    }
    button {
      width: 20em;
      height: 3em;
      margin-top: 1em;
      margin-bottom: 1em;
      cursor: pointer;
    }
    .forecast button {
      visibility: hidden;
    }
    html,
    body,
    .app-wrapper {
      width: 100%;
      height: 100%;
    }
    #mouse-evt-overlay {
      z-index: 100;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    p, h1, h2, h3, h4, h5, h6 {
      margin-top: 0.5em;
      margin-bottom: 0.5em;
    }
    .btn-wrapper {
      width: 600px;

    }
    .work-title, .image-caption {
      font-size: 15px;
      border-left: 4px #A02030 solid;
      padding-left: 6px;

    }
    .work-title {
      border-left: 4px #2030A0 solid;
    }
    .image-caption {
      border-left: 4px #A02030 solid;
    }
    .link-deactivated a {
        color: inherit;
    	pointer-events: none;
	text-decoration: none;
    }
    .lang-select {
        z-index: 101;
    	position: fixed;
	background: black;
	padding: 0.5em;
	color: white;
	right: 0;
	bottom: 0;
    }
    .tips-scroll-wrap {
      position: fixed;
      bottom: 0;
      left: calc((50vw - 400px) / 2 - (270px / 2));
      width: 270px;
      text-align: center;
      opacity: 1;
      animation: 100s linear 0s 1 normal none running tips-scroll-anim-wrap;
      animation-timeline: scroll(root);
    }
    .tips-scroll {
      opacity: 0;
      animation: 3s ease-in-out 10s infinite alternate none running tips-scroll-anim;
    }
    .tips-words {
      position: fixed;
      bottom: 0;
      left: calc((50vw - 400px) / 2 - (340px / 2));
      width: 340px;
      opacity: 1;
      top: calc(50vh - 40px);
      height:50px;
      animation: 10s linear 0s 1 normal forecast-introduce;
    }
    @keyframes tips-scroll-anim {
      from {
	opacity: 0;
      }
      to {
	opacity: 1;
      }
    }
    @keyframes tips-scroll-anim-wrap {
      0% {
	opacity: 1;
      }
      90% {
	opacity: 0.9;
      }
      100% {
	opacity: 0;
      }
    }
  </style>
</head>
<body>
  <script type="module">
    window.addEventListener("mouseup", (e) => {
      if (e.button === 3 || e.button === 4) {
        e.preventDefault()
      };
    });
    import shimbun from "./shimbun.js?commitid=PUT_COMMIT_ID_HERE";
    shimbun();
  </script>
</body>
