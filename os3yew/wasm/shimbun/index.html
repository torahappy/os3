<!doctype html>
<head>
  <title>しんぶんはじぶん</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    /* Reset CSS from https://www.joshwcomeau.com/css/custom-css-reset/ */
    /* 1. Use a more-intuitive box-sizing model */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    /* 2. Remove default margin */
    * {
      margin: 0;
    }

    /* 3. Enable keyword animations */
    @media (prefers-reduced-motion: no-preference) {
      html {
        interpolate-size: allow-keywords;
      }
    }

    body {
      /* 4. Add accessible line-height */
      line-height: 1.5;
      /* 5. Improve text rendering */
      -webkit-font-smoothing: antialiased;
    }

    /* 6. Improve media defaults */
    img,
    picture,
    video,
    canvas,
    svg {
      display: block;
      max-width: 100%;
    }

    /* 7. Inherit fonts for form controls */
    input,
    button,
    textarea,
    select {
      font: inherit;
    }

    /* 8. Avoid text overflows */
    p,
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      overflow-wrap: break-word;
    }

    /* 9. Improve line wrapping */
    p {
      text-wrap: pretty;
    }
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      text-wrap: balance;
    }

    /*
  10. Create a root stacking context
*/

    #root,
    #__next {
      isolation: isolate;
    }
    /* END reset CSS*/
    .footnote {
      font-size: 13px;
      background: black;
      color: #e0e0e0;
    }
    .footnote a {
      color: #e0e0ff;
    }
    @font-face {
      font-family: "GenEi Koburi Mincho v6";
      src: url("assets/GenEiKoburiMin6-R.ttf");
    }
    * {
      font-family: "GenEi Koburi Mincho v6", serif;
    }
    body {
      font-size: 18px;
    }
    .article img {
      width: 100%;
      height: 30em;
      object-fit: contain;
      object-position: left;
    }
    .article.fading {
      transition-property: opacity;
      transition-duration: 10s;
      transition-delay: 0s;
      opacity: 0;
    }
    .article.hidden {
      display: none;
    }
    .forecast img {
      opacity: 0.3;
    }
    .app-wrapper:has(.forecast) {
      filter: url("#forecast-filter");
      pointer-events: none;
    }
    button {
      width: 20em;
      height: 3em;
      margin-top: 1em;
      margin-bottom: 1em;
    }
    html, body, .app-wrapper { width: 100%; height: 100%;}
    #mouse-evt-overlay {
      z-index: 100;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <script type="module">
    import shimbun from "./shimbun.js";
    shimbun();
  </script>
</body>
