<!doctype html>
<head>
  <title>しんぶんはじぶん</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    /* Reset CSS from https://www.joshwcomeau.com/css/custom-css-reset/ */
    /* 1. Use a more-intuitive box-sizing model */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    /* 2. Remove default margin */
    * {
      margin: 0;
    }

    /* 3. Enable keyword animations */
    @media (prefers-reduced-motion: no-preference) {
      html {
        interpolate-size: allow-keywords;
      }
    }

    body {
      /* 4. Add accessible line-height */
      line-height: 1.5;
      /* 5. Improve text rendering */
      -webkit-font-smoothing: antialiased;
    }

    /* 6. Improve media defaults */
    img,
    picture,
    video,
    canvas,
    svg {
      display: block;
      max-width: 100%;
    }

    /* 7. Inherit fonts for form controls */
    input,
    button,
    textarea,
    select {
      font: inherit;
    }

    /* 8. Avoid text overflows */
    p,
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      overflow-wrap: break-word;
    }

    /* 9. Improve line wrapping */
    p {
      text-wrap: pretty;
    }
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      text-wrap: balance;
    }

    /*
  10. Create a root stacking context
*/

    #root,
    #__next {
      isolation: isolate;
    }
    /* END reset CSS*/
    body {
    	margin: 2em;
	background: black;
    }
    a {
    	font-size: 50px;
	color: white;
    }
    video {
    	width: 100vw;
	height: 50vh;
	object-fit: center;
	pointer-events: none;
    }
    p {
    	text-align: center;
    }
  </style>
</head>
<body>
  <video controls autoplay>
    <source src="assets/title.webm" type="video/mp4">
  </video>
  <p><a href="index.html?lang=en&tts=api">英 ENGLISH 語</a></p>
  <p><a href="index.html?lang=ja&tts=api">日 JAPANESE 本語</a></p>
</body>
